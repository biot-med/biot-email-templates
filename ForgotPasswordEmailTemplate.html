<!DOCTYPE html
  PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
  <link href="https://fonts.googleapis.com/css?family=Nunito+Sans" rel="stylesheet" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <!-- TODO: BACKGROUND COLOR => use both background-color and bgcolor.
    When using linear-gradient we'll define it in addition to the other two.
  NOTE THAT each email client renders differently so for responsive purposes we'll put the background color in all 3 palces -->
  <table style="
    /* background-image: linear-gradient(359deg, #535564, #ffffff); */
    background-color: #ffffff;
     position: relative; display: inline-block; width: auto; height: auto; overflow-y: visible;
     font-family: Nunito Sans, Sans-Sherif;" bgcolor="#ffffff">
    <!-- <tr id="sortable" style="position: relative; overflow-y: visible; height: 100%;"> -->
    <tr style="position: relative; margin: 0px; opacity: 1;">
      <td>
        <table width="800" border="0" cellspacing="0" cellpadding="0">
          <!-- START HEIGHT SPACE 1PX LAYOUT-1 -->
          <tr>
            <td full-width="false" valign="top" align="center">
              <table width="600" height="1" align="center" border="0" cellspacing="0" cellpadding="0"
                style="min-width:600px;">
                <tbody>
                  <tr>
                    <td valign="top" height="1" width="600" style="width: 600px; position: relative;">
                      <span width="600" alt="space"
                        style="display:block; max-height:1px; max-width:600px; min-width:300px;"> </span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </td>
          </tr><!-- END HEIGHT SPACE 1PX LAYOUT-1-->
        </table>
      </td>
    </tr>
    <tr style="position: relative; margin: 0px; opacity: 1;">
      <td>
        <table align="center" border="0" cellpadding="0" cellspacing="0"
          style="opacity: 1; position: relative; z-index: 0;" width="100%">
          <tbody>
            <tr>
              <td>
                <table align="center" border="0" cellpadding="0" cellspacing="0" style=" max-width: 800px;"
                  width="100%">
                  <tbody>
                    <tr>
                      <td height="60">
                      </td>
                    </tr>
                    <tr>
                      <td valign="top">
                        <table align="center" border="0" cellpadding="0" cellspacing="0" width="600">
                          <!-- Content -->
                          <!-- Image -->
                          <!-- change the logo's URL according to the current project's logo and set the width and the height accordingly-->
                          <tbody>
                            <tr>
                              <td align="center" valign="top"><img alt="img" src="https://www.biot-med.com/wp-content/uploads/2018/10/logo-all-2.png"
                                  style="border: 0px; display: block; font-size: 0px; line-height: 0px;" width="146"
                                  height="73"></td>
                            </tr>
                            <!-- START HEIGHT SPACE 20PX LAYOUT-1 -->
                            <tr>
                              <td full-width="false" valign="top" align="center">
                                <table width="600" height="20" align="center" border="0" cellspacing="0" cellpadding="0"
                                  style=" min-width:600px;">
                                  <tbody>
                                    <tr>
                                      <td valign="top" height="20" width="600"
                                        style="width: 600px; position: relative;">
                                        <span width="600" alt="space"
                                          style="display:block; max-height:20px; max-width:600px;"> </span>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr><!-- END HEIGHT SPACE 20PX LAYOUT-1-->
                            <!-- End Image -->
                            <!--TODO: Change the color: #333333 color in order change the font's color -->
                            <tr>
                                <td align="center"
                                  style="color: #333333;  font-size: 15px; font-weight: 400; line-height: 26px; padding-top: 15px;"
                                  valign="top">
                                  <multiline>${ForgotPasswordEmailTemplate_hello}$</multiline>
                                </td>
                              </tr>
                            <tr>
                              <td align="center"
                                style="color: #333333; font-size: 18px; font-weight: 600; line-height: 30px; padding-top: 15px;">
                                <multiline>${ForgotPasswordEmailTemplate_forgotPassword}$
                                </multiline>
                              </td>
                            </tr>
                            <!-- End Content -->
                            <tr>
                              <td align="center"
                                style="color: #333333; font-size: 15px; font-weight: 400; line-height: 26px; padding-top: 15px;"
                                valign="top">
                                <multiline >${ForgotPasswordEmailTemplate_getNewPassword}$</multiline>
                              </td>
                            </tr>
                            <!-- End Content -->
                            <!-- Reset Password -->
                            <!--TODO: the button's color is defined in here. Since its a table, too, we'll define all 3 background options-->
                            <tr>
                              <td style="padding-top: 30px;" valign="top">
                                <table align="center" border="0" cellpadding="0" cellspacing="0" height="45" width="200" bgcolor="#1fd3da"
                                  style="
                                  /* background-image: linear-gradient(359deg, #1fd3da, #ffffff); */
                                  background-color:#1fd3da; border-radius: 25px;"
                                  width="130">
                                  <tbody>
                                    <tr>
                                      <!--TODO: button's fint color-->
                                      <td align="center" height="35" width="200"
                                        style="color: rgb(247,247,247); font-size: 14px; font-weight: 600;"
                                        valign="middle"><a href="{{message}}"
                                          style="color: rgb(247,247,247); text-decoration: none;">
                                          <multiline>${ForgotPasswordEmailTemplate_resetPassword}$</multiline>
                                        </a></td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr>
                            <!-- End Reset Password -->
                            <!-- START HEIGHT SPACE 20PX LAYOUT-1 -->
                            <tr>
                              <td full-width="false" valign="top" align="center">
                                <table width=" 600" height="20" align="center" border="0" cellspacing="0"
                                  cellpadding="0" style="min-width:600px;">
                                  <tbody>
                                    <tr>
                                      <td valign=" top" height="20" width="600"
                                        style="width: 600px; position: relative;">
                                        <span width="600" alt="space"
                                          style="display:block; max-height:20px; max-width:600px;">
                                        </span>
                                      </td>
                                    </tr>
                                  </tbody>
                                </table>
                              </td>
                            </tr><!-- END HEIGHT SPACE 20PX LAYOUT-1-->
                            <!--tr>
                              <td align="center"
                                style="color: #333333; font-size: 15px; font-weight: 400; line-height: 26px; padding-top: 15px;"
                                valign="top">
                                <multiline>${ForgotPasswordEmailTemplate_setNewPasswordTime}$</multiline>
                              </td>
                            </tr-->
                            <tr>
                              <td align="center"
                                style="color: #333333; font-size: 15px; font-weight: 400; line-height: 26px; padding-top: 15px;"
                                valign="top">
                                <a style="text-decoration:none; color:#333333;"
                                  href="https://www.biot-med.com/">${ForgotPasswordEmailTemplate_websiteLink}$</a>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    <tr>
                      <td height="60">
                      </td>
                    </tr>
                  </tbody>
                </table>
              </td>
            </tr>
          </tbody>
        </table>
      <td>
    </tr>
  </table>

</body>

</html>
